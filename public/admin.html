<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель - Travka</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }
    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tab-btn.active {
      color: #007bff;
      border-bottom-color: #007bff;
    }
    .admin-section {
      background: #f5f5f5;
      padding: 20px;
      margin: 20px 0;
      border-radius: 5px;
    }
    .admin-section h3 {
      margin-top: 0;
    }
    #create-lot-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 500px;
    }
    #create-lot-form input,
    #create-lot-form textarea {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .lots-table, .orders-table, .users-table {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .lot-row, .order-row, .user-row {
      background: white;
      padding: 15px;
      border-radius: 5px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      align-items: center;
    }
    .order-row {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .user-row {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .btn-danger {
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-danger:hover {
      background: #c82333;
    }
    select {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1>🪨 Travka - Админ-панель</h1>
      <div class="nav-links">
        <span id="user-info">Админ</span>
        <button id="logout-btn" class="btn-login">Выход</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="admin-section">
      <h2>⚙️ Админ-панель</h2>
      
      <div class="admin-tabs">
        <button class="tab-btn active" data-tab="lots">📦 Товары</button>
        <button class="tab-btn" data-tab="orders">📋 Заказы</button>
        <button class="tab-btn" data-tab="users">👥 Пользователи</button>
      </div>

      <div id="tab-content"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Travka Admin. Все права защищены.</p>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
          await Auth.adminLogout();
          window.location.href = '/';
        });
      }
    });
  </script>
</body>
</html>
