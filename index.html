<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бедрок-клад — вход</title>
<link rel="stylesheet" href="/style.css">
<style>
  .gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .gate-card {
    width: 100%;
    max-width: 420px;
    text-align: center;
    padding: 48px 36px;
    position: relative;
    overflow: hidden;
  }
  .gate-card::before {
    content: '';
    position: absolute;
    top: -60%;
    left: -20%;
    width: 140%;
    height: 140%;
    background: radial-gradient(circle, rgba(201,162,75,0.12), transparent 60%);
    pointer-events: none;
  }
  .glyph {
    width: 56px;
    height: 56px;
    margin: 0 auto 20px;
    opacity: 0.9;
  }
  .gate h1 {
    font-size: 34px;
    margin-bottom: 6px;
  }
  .gate .eyebrow { display: block; margin-bottom: 14px; }
  .gate p.lede {
    color: var(--parchment-dim);
    font-size: 15px;
    margin: 0 0 28px;
  }
  .gate form { text-align: left; }
  .gate .btn { width: 100%; margin-top: 6px; }
  .hint {
    margin-top: 22px;
    font-size: 12px;
    color: var(--stone-600);
    line-height: 1.5;
  }
  .coords-decor {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--stone-700);
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="gate">
  <div class="card gate-card">
    <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2">
      <path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2z"/>
    </svg>
    <span class="eyebrow">закрытая точка выдачи</span>
    <h1>Вход по нику</h1>
    <p class="lede">Назовись — и попадёшь в лавку. Без пароля, без лишних вопросов.</p>

    <form id="loginForm">
      <div class="field">
        <label for="nickname">Ник в Minecraft</label>
        <input type="text" id="nickname" name="nickname" placeholder="Steve_2011" autocomplete="off" maxlength="16" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Войти</button>
    </form>

    <p class="hint">Профиль создаётся автоматически при первом входе.<br>Заявки и координаты кладов хранятся в твоём личном кабинете.</p>
    <div class="coords-decor">X: ??? · Y: ??? · Z: ???</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const form = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const toast = document.getElementById('toast');

function showToast(msg, isError) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 3200);
}

// Если уже вошли — сразу в магазин
fetch('/api/user/me').then(r => r.json()).then(d => {
  if (d.loggedIn) window.location.href = '/shop';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const nickname = document.getElementById('nickname').value.trim();
  if (!nickname) return;

  submitBtn.disabled = true;
  submitBtn.textContent = 'Входим...';

  try {
    const res = await fetch('/api/user/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка входа');
    window.location.href = '/shop';
  } catch (err) {
    showToast(err.message, true);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Войти';
  }
});
</script>
</body>
</html>
