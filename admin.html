<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель управления</title>
<link rel="stylesheet" href="/style.css">
<style>
  /* --- Вход в админку --- */
  .gate { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .gate-card { width:100%; max-width:380px; padding:40px 32px; }
  .gate h1 { font-size:26px; margin-bottom:6px; }
  .gate p.lede { color:var(--parchment-dim); font-size:14px; margin:0 0 24px; }
  .gate .btn { width:100%; margin-top:4px; }

  /* --- Основной интерфейс --- */
  body.panel { }
  header.top {
    border-bottom: 1px solid var(--stone-700);
    padding: 18px 0;
    position: sticky; top:0;
    background: rgba(22,20,15,0.95);
    z-index: 50;
  }
  .top-inner { display:flex; align-items:center; justify-content:space-between; }
  .brand { font-family: var(--font-display); font-size:20px; display:flex; align-items:center; gap:10px; }
  .brand svg { width:22px; height:22px; }

  .tabs { display:flex; gap:6px; padding:24px 0 0; }
  .tab-btn {
    background:none; border:1px solid var(--stone-700); color:var(--parchment-dim);
    padding:10px 20px; border-radius:3px 3px 0 0; cursor:pointer; font-family:var(--font-body);
    font-size:14px; border-bottom:none; transition: color .15s, background .15s;
  }
  .tab-btn.active { color: var(--gold-bright); background: var(--stone-900); border-color: var(--stone-700); }
  .tab-panel { display:none; padding: 24px 0 80px; }
  .tab-panel.active { display:block; }

  .section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:12px; }
  .section-head h2 { font-size:24px; }

  /* Lots table */
  .lots-admin-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap:16px; }
  .lot-admin-card { display:flex; flex-direction:column; gap:10px; padding:16px; }
  .lot-admin-photo { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:3px; background:var(--stone-800); }
  .lot-admin-photo.placeholder { display:flex; align-items:center; justify-content:center; color:var(--stone-600); font-family:var(--font-mono); font-size:11px; }
  .lot-admin-title { font-family:var(--font-display); font-size:19px; }
  .lot-admin-meta { display:flex; justify-content:space-between; font-size:13px; color:var(--parchment-dim); font-family:var(--font-mono); }
  .lot-admin-actions { display:flex; gap:8px; margin-top:4px; }
  .lot-admin-actions .btn { flex:1; }
  .inactive-badge { font-size:11px; color: var(--danger); font-family: var(--font-mono); text-transform:uppercase; letter-spacing:0.05em; }

  /* Orders */
  .orders-admin-list { display:flex; flex-direction:column; gap:14px; }
  .order-admin-card { padding:18px; }
  .order-admin-top { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; margin-bottom:12px; }
  .order-admin-title { font-family:var(--font-display); font-size:19px; }
  .order-admin-sub { font-family:var(--font-mono); font-size:12px; color:var(--parchment-dim); }
  .order-admin-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:12px; }
  @media (max-width:560px) { .order-admin-grid { grid-template-columns: 1fr; } }
  .status-select { width:100%; }
  .status-pill {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 20px; white-space: nowrap; border: 1px solid;
  }
  .status-pending { color: var(--gold-bright); border-color: var(--gold); }
  .status-confirmed { color: #7fb2e8; border-color: #5f8cba; }
  .status-completed { color: var(--ok); border-color: var(--ok); }
  .status-cancelled { color: var(--danger); border-color: var(--danger); }

  .empty-state { text-align:center; padding:60px 20px; color:var(--parchment-dim); }

  /* Modal for lot create/edit */
  .modal-overlay { position:fixed; inset:0; background:rgba(15,13,10,0.8); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; overflow-y:auto; }
  .modal-overlay.show { display:flex; }
  .modal { max-width:460px; width:100%; max-height: 90vh; overflow-y:auto; }
  .modal h3 { font-size:22px; margin-bottom:18px; }
  .modal-actions { display:flex; gap:10px; margin-top:16px; }
  .modal-actions .btn { flex:1; }
  .photo-preview { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:3px; margin-bottom:10px; display:none; background:var(--stone-800); }
  .photo-preview.show { display:block; }
  .checkbox-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  .checkbox-row input { width:16px; height:16px; }
  .checkbox-row label { font-size:14px; color:var(--parchment); text-transform:none; letter-spacing:0; }

  .stat-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:4px; }
  .stat-chip {
    font-family:var(--font-mono); font-size:12px; color:var(--parchment-dim);
    border:1px solid var(--stone-700); padding:6px 14px; border-radius:20px;
  }
</style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div class="gate" id="gateScreen">
  <div class="card gate-card">
    <span class="eyebrow">служебный вход</span>
    <h1>Панель управления</h1>
    <p class="lede">Доступ только по паролю.</p>
    <form id="adminLoginForm">
      <div class="field">
        <label for="adminPassword">Пароль</label>
        <input type="password" id="adminPassword" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="adminLoginBtn">Войти</button>
    </form>
  </div>
</div>

<!-- ОСНОВНАЯ ПАНЕЛЬ -->
<div id="panelScreen" style="display:none;">
  <header class="top">
    <div class="container top-inner">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.3"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2z"/></svg>
        Панель управления
      </div>
      <button class="btn btn-ghost btn-sm" id="adminLogoutBtn">Выйти</button>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="orders">Заявки</button>
      <button class="tab-btn" data-tab="lots">Лоты</button>
      <button class="tab-btn" data-tab="users">Пользователи</button>
    </div>

    <!-- ЗАЯВКИ -->
    <div class="tab-panel active" id="tab-orders">
      <div class="section-head">
        <h2>Заявки</h2>
      </div>
      <div class="orders-admin-list" id="ordersAdminList">Загрузка...</div>
    </div>

    <!-- ЛОТЫ -->
    <div class="tab-panel" id="tab-lots">
      <div class="section-head">
        <h2>Лоты</h2>
        <button class="btn btn-primary btn-sm" id="newLotBtn">+ Новый лот</button>
      </div>
      <div class="lots-admin-grid" id="lotsAdminGrid">Загрузка...</div>
    </div>

    <!-- ПОЛЬЗОВАТЕЛИ -->
    <div class="tab-panel" id="tab-users">
      <div class="section-head"><h2>Пользователи</h2></div>
      <div class="orders-admin-list" id="usersList">Загрузка...</div>
    </div>
  </div>
</div>

<!-- МОДАЛКА СОЗДАНИЯ/РЕДАКТИРОВАНИЯ ЛОТА -->
<div class="modal-overlay" id="lotModalOverlay">
  <div class="card modal">
    <h3 id="lotModalTitle">Новый лот</h3>
    <img class="photo-preview" id="photoPreview" alt="">
    <form id="lotForm">
      <div class="field">
        <label for="lotTitle">Название</label>
        <input type="text" id="lotTitle" required maxlength="80">
      </div>
      <div class="field">
        <label for="lotPrice">Цена, ₽</label>
        <input type="number" id="lotPrice" min="0" step="1" required>
      </div>
      <div class="field">
        <label for="lotDesc">Описание</label>
        <textarea id="lotDesc" maxlength="500"></textarea>
      </div>
      <div class="field">
        <label for="lotQty">Количество в наличии</label>
        <input type="number" id="lotQty" min="0" step="1" value="1" required>
      </div>
      <div class="field">
        <label for="lotPhoto">Фото</label>
        <input type="file" id="lotPhoto" accept="image/*">
      </div>
      <div class="checkbox-row" id="activeRow" style="display:none;">
        <input type="checkbox" id="lotActive">
        <label for="lotActive">Лот активен (виден в лавке)</label>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="lotModalCancel">Отмена</button>
        <button type="submit" class="btn btn-primary" id="lotModalSave">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const toast = document.getElementById('toast');
function showToast(msg, isError) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 3200);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

const gateScreen = document.getElementById('gateScreen');
const panelScreen = document.getElementById('panelScreen');

async function checkAuth() {
  const res = await fetch('/api/admin/me').then(r => r.json());
  if (res.isAdmin) {
    gateScreen.style.display = 'none';
    panelScreen.style.display = 'block';
    loadOrders();
    loadLots();
    loadUsers();
  } else {
    gateScreen.style.display = 'flex';
    panelScreen.style.display = 'none';
  }
}

document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('adminPassword').value;
  const btn = document.getElementById('adminLoginBtn');
  btn.disabled = true;
  btn.textContent = 'Проверяем...';
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка входа');
    checkAuth();
  } catch (err) {
    showToast(err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Войти';
  }
});

document.getElementById('adminLogoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin/logout', { method: 'POST' });
  checkAuth();
});

// --- ТАБЫ ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// --- ЗАЯВКИ ---
const statusLabels = {
  pending: 'Ожидает', confirmed: 'Подтверждено', completed: 'Выдано', cancelled: 'Отменено'
};

async function loadOrders() {
  const list = document.getElementById('ordersAdminList');
  const res = await fetch('/api/admin/orders');
  if (res.status === 401) { checkAuth(); return; }
  const orders = await res.json();

  if (orders.length === 0) {
    list.innerHTML = `<div class="empty-state">Заявок пока нет.</div>`;
    return;
  }

  list.innerHTML = orders.map(o => `
    <div class="card order-admin-card" data-id="${o.id}">
      <div class="order-admin-top">
        <div>
          <div class="order-admin-title">${escapeHtml(o.lotTitle)} <span class="muted" style="font-size:14px;">× ${o.quantity}</span></div>
          <div class="order-admin-sub">от ${escapeHtml(o.nickname)} · ${new Date(o.createdAt).toLocaleString('ru-RU')} · ${o.price * o.quantity} ₽</div>
        </div>
        <span class="status-pill status-${o.status}">${statusLabels[o.status] || o.status}</span>
      </div>
      <div class="order-admin-grid">
        <div class="field" style="margin-bottom:0;">
          <label>Статус</label>
          <select class="status-select order-status" data-id="${o.id}">
            <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Ожидает</option>
            <option value="confirmed" ${o.status === 'confirmed' ? 'selected' : ''}>Подтверждено</option>
            <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>Выдано</option>
            <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Отменено</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Координаты клада</label>
          <input type="text" class="order-coords" data-id="${o.id}" placeholder="X: 120 Y: 64 Z: -380" value="${escapeHtml(o.coords || '')}">
        </div>
      </div>
      <div class="field" style="margin-bottom:0; margin-top:12px;">
        <label>Заметка для покупателя (необязательно)</label>
        <input type="text" class="order-note" data-id="${o.id}" placeholder="Например: сундук под водопадом" value="${escapeHtml(o.adminNote || '')}">
      </div>
      <div style="margin-top:14px;">
        <button class="btn btn-primary btn-sm save-order-btn" data-id="${o.id}">Сохранить</button>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.save-order-btn').forEach(btn => {
    btn.addEventListener('click', () => saveOrder(btn.dataset.id));
  });
}

async function saveOrder(id) {
  const status = document.querySelector(`.order-status[data-id="${id}"]`).value;
  const coords = document.querySelector(`.order-coords[data-id="${id}"]`).value;
  const adminNote = document.querySelector(`.order-note[data-id="${id}"]`).value;

  const btn = document.querySelector(`.save-order-btn[data-id="${id}"]`);
  btn.disabled = true;
  btn.textContent = 'Сохраняем...';

  try {
    const res = await fetch(`/api/admin/orders/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, coords, adminNote })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка сохранения');
    showToast('Заявка обновлена');
    loadOrders();
    loadLots();
  } catch (err) {
    showToast(err.message, true);
    btn.disabled = false;
    btn.textContent = 'Сохранить';
  }
}

// --- ЛОТЫ ---
let editingLotId = null;
let allLots = [];

async function loadLots() {
  const grid = document.getElementById('lotsAdminGrid');
  const res = await fetch('/api/admin/lots');
  if (res.status === 401) { checkAuth(); return; }
  allLots = await res.json();

  if (allLots.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">Лотов пока нет. Создай первый.</div>`;
    return;
  }

  grid.innerHTML = allLots.map(lot => `
    <div class="card lot-admin-card">
      ${lot.photo ? `<img class="lot-admin-photo" src="${lot.photo}" alt="">` : `<div class="lot-admin-photo placeholder">без фото</div>`}
      <div class="lot-admin-title">${escapeHtml(lot.title)}</div>
      ${!lot.active ? '<span class="inactive-badge">скрыт</span>' : ''}
      <div class="lot-admin-meta">
        <span>${lot.price} ₽</span>
        <span>шт: ${lot.quantity}</span>
      </div>
      <div class="lot-admin-actions">
        <button class="btn btn-ghost btn-sm edit-lot-btn" data-id="${lot.id}">Изменить</button>
        <button class="btn btn-danger btn-sm delete-lot-btn" data-id="${lot.id}">Удалить</button>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.edit-lot-btn').forEach(btn => {
    btn.addEventListener('click', () => openLotModal(allLots.find(l => l.id === btn.dataset.id)));
  });
  grid.querySelectorAll('.delete-lot-btn').forEach(btn => {
    btn.addEventListener('click', () => deleteLot(btn.dataset.id));
  });
}

async function deleteLot(id) {
  if (!confirm('Удалить этот лот? Действие необратимо.')) return;
  try {
    const res = await fetch(`/api/admin/lots/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка удаления');
    showToast('Лот удалён');
    loadLots();
  } catch (err) {
    showToast(err.message, true);
  }
}

const lotModalOverlay = document.getElementById('lotModalOverlay');
const lotForm = document.getElementById('lotForm');

document.getElementById('newLotBtn').addEventListener('click', () => openLotModal(null));
document.getElementById('lotModalCancel').addEventListener('click', closeLotModal);
lotModalOverlay.addEventListener('click', (e) => { if (e.target === lotModalOverlay) closeLotModal(); });

function openLotModal(lot) {
  editingLotId = lot ? lot.id : null;
  document.getElementById('lotModalTitle').textContent = lot ? 'Изменить лот' : 'Новый лот';
  document.getElementById('lotTitle').value = lot ? lot.title : '';
  document.getElementById('lotPrice').value = lot ? lot.price : '';
  document.getElementById('lotDesc').value = lot ? lot.description : '';
  document.getElementById('lotQty').value = lot ? lot.quantity : 1;
  document.getElementById('lotPhoto').value = '';

  const preview = document.getElementById('photoPreview');
  if (lot && lot.photo) {
    preview.src = lot.photo;
    preview.classList.add('show');
  } else {
    preview.classList.remove('show');
  }

  const activeRow = document.getElementById('activeRow');
  if (lot) {
    activeRow.style.display = 'flex';
    document.getElementById('lotActive').checked = lot.active;
  } else {
    activeRow.style.display = 'none';
  }

  lotModalOverlay.classList.add('show');
}

function closeLotModal() {
  lotModalOverlay.classList.remove('show');
  editingLotId = null;
  lotForm.reset();
}

document.getElementById('lotPhoto').addEventListener('change', (e) => {
  const file = e.target.files[0];
  const preview = document.getElementById('photoPreview');
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.classList.add('show');
  }
});

lotForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('lotModalSave');
  btn.disabled = true;
  btn.textContent = 'Сохраняем...';

  const formData = new FormData();
  formData.append('title', document.getElementById('lotTitle').value);
  formData.append('price', document.getElementById('lotPrice').value);
  formData.append('description', document.getElementById('lotDesc').value);
  formData.append('quantity', document.getElementById('lotQty').value);
  const photoFile = document.getElementById('lotPhoto').files[0];
  if (photoFile) formData.append('photo', photoFile);
  if (editingLotId) {
    formData.append('active', document.getElementById('lotActive').checked);
  }

  try {
    const url = editingLotId ? `/api/admin/lots/${editingLotId}` : '/api/admin/lots';
    const method = editingLotId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка сохранения');
    showToast(editingLotId ? 'Лот обновлён' : 'Лот создан');
    closeLotModal();
    loadLots();
  } catch (err) {
    showToast(err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Сохранить';
  }
});

// --- ПОЛЬЗОВАТЕЛИ ---
async function loadUsers() {
  const list = document.getElementById('usersList');
  const res = await fetch('/api/admin/users');
  if (res.status === 401) return;
  const users = await res.json();

  if (users.length === 0) {
    list.innerHTML = `<div class="empty-state">Пока никто не заходил.</div>`;
    return;
  }

  list.innerHTML = `<div class="stat-row">` + users.map(u =>
    `<span class="stat-chip">${escapeHtml(u.nickname)} · ${new Date(u.createdAt).toLocaleDateString('ru-RU')}</span>`
  ).join('') + `</div>`;
}

checkAuth();
</script>
</body>
</html>
